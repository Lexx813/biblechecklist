<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080" role="img" aria-label="Jehovah Mwema, Psalm 55:22">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="55%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="62%" r="40%">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#sun)"/>

  <!-- Faint baseline grid -->
  <g stroke="#FAF5FF" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="270" x2="1080" y2="270"/>
    <line x1="0" y1="540" x2="1080" y2="540"/>
    <line x1="0" y1="810" x2="1080" y2="810"/>
    <line x1="540" y1="0" x2="540" y2="1080"/>
  </g>

  <!-- Top brand mark -->
  <g font-family="'Plus Jakarta Sans Variable', 'Plus Jakarta Sans', system-ui, sans-serif" font-weight="700" font-size="22" letter-spacing="0.32em" fill="#FAF5FF" fill-opacity="0.85">
    <text x="60" y="100">JW STUDY</text>
    <text x="1020" y="100" text-anchor="end">010</text>
  </g>

  <!-- Title -->
  <g font-family="'Plus Jakarta Sans Variable', 'Plus Jakarta Sans', system-ui, sans-serif" font-weight="800" letter-spacing="-0.05em">
    <text x="60" y="500" font-size="160" fill="#FAF5FF">JEHOVAH</text>
    <text x="60" y="660" font-size="220" fill="#FCD34D">MWEMA.</text>
  </g>

  <!-- Subtitle: bilingual hook -->
  <g font-family="'Plus Jakarta Sans Variable', 'Plus Jakarta Sans', system-ui, sans-serif" font-weight="500" letter-spacing="-0.005em">
    <text x="60" y="750" font-size="44" fill="#FAF5FF" fill-opacity="0.92">Jehovah is good.</text>
    <text x="60" y="800" font-size="34" fill="#FAF5FF" fill-opacity="0.7" font-style="italic">"He loves you · Anakupenda"</text>
  </g>

  <!-- Bottom meta row -->
  <g font-family="'Plus Jakarta Sans Variable', 'Plus Jakarta Sans', system-ui, sans-serif" font-weight="600" font-size="22" letter-spacing="0.28em" fill="#FAF5FF">
    <text x="60" y="1010" fill-opacity="0.92">PSALM 55:22</text>
    <text x="1020" y="1010" text-anchor="end" fill-opacity="0.62">SWAHILI · ENGLISH</text>
  </g>

  <!-- Hairlines -->
  <line x1="60" y1="970" x2="1020" y2="970" stroke="#FAF5FF" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="60" y1="130" x2="1020" y2="130" stroke="#FAF5FF" stroke-opacity="0.22" stroke-width="1"/>
</svg>
