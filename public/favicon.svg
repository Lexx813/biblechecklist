<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#2D1060"/>
      <stop offset="100%" stop-color="#0a0514"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="58%" r="45%">
      <stop offset="0%" stop-color="#7B2FE0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7B2FE0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spineGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc80ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#aa3bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="purpleGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#aa3bff" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Full-bleed background (critical for maskable icons) -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Subtle background glow -->
  <ellipse cx="256" cy="275" rx="180" ry="120" fill="url(#glowGrad)"/>

  <!-- === Open Book === -->
  <!-- Left page -->
  <path d="M 148 196 C 185 190 225 187 256 189 L 256 338 C 225 340 182 344 142 350 Z"
        fill="#25104A"/>
  <!-- Left page highlight (slight sheen) -->
  <path d="M 148 196 C 185 190 225 187 256 189 L 256 230 C 225 228 185 231 148 237 Z"
        fill="#321565" opacity="0.5"/>

  <!-- Right page -->
  <path d="M 256 189 C 287 187 327 190 364 196 L 370 350 C 330 344 287 340 256 338 Z"
        fill="#2D1260"/>
  <!-- Right page highlight -->
  <path d="M 256 189 C 287 187 327 190 364 196 L 364 237 C 327 231 287 228 256 230 Z"
        fill="#3D1870" opacity="0.5"/>

  <!-- Page shadow/depth at bottom -->
  <path d="M 142 350 C 190 356 224 354 256 352 C 288 354 322 356 370 350 L 367 358 C 322 364 288 362 256 360 C 224 362 190 364 139 358 Z"
        fill="#0a0514" opacity="0.6"/>

  <!-- Left page text lines -->
  <line x1="174" y1="227" x2="242" y2="223" stroke="rgba(255,255,255,0.45)" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="171" y1="250" x2="242" y2="247" stroke="rgba(255,255,255,0.28)" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="171" y1="271" x2="242" y2="269" stroke="rgba(255,255,255,0.22)" stroke-width="4" stroke-linecap="round"/>
  <line x1="171" y1="291" x2="242" y2="290" stroke="rgba(255,255,255,0.16)" stroke-width="4" stroke-linecap="round"/>
  <line x1="171" y1="310" x2="225" y2="310" stroke="rgba(255,255,255,0.10)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right page text lines -->
  <line x1="270" y1="223" x2="338" y2="227" stroke="rgba(255,255,255,0.45)" stroke-width="5.5" stroke-linecap="round"/>
  <line x1="270" y1="247" x2="341" y2="250" stroke="rgba(255,255,255,0.28)" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="270" y1="269" x2="341" y2="271" stroke="rgba(255,255,255,0.22)" stroke-width="4" stroke-linecap="round"/>
  <line x1="270" y1="290" x2="341" y2="291" stroke="rgba(255,255,255,0.16)" stroke-width="4" stroke-linecap="round"/>
  <line x1="287" y1="310" x2="341" y2="310" stroke="rgba(255,255,255,0.10)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Book spine (glowing purple line) -->
  <line x1="256" y1="189" x2="256" y2="338" stroke="#aa3bff" stroke-width="3.5" opacity="0.85" filter="url(#purpleGlow)"/>

  <!-- Top curve of open book -->
  <path d="M 148 196 Q 200 183 256 186 Q 312 183 364 196"
        fill="none" stroke="#5B2D8E" stroke-width="2" opacity="0.7"/>

  <!-- === Progress indicator dots at bottom === -->
  <!-- Representing reading progress - a subtle decorative element -->
  <g opacity="0.8">
    <circle cx="216" cy="376" r="5" fill="#aa3bff"/>
    <circle cx="232" cy="376" r="5" fill="#aa3bff"/>
    <circle cx="248" cy="376" r="5" fill="#aa3bff"/>
    <circle cx="264" cy="376" r="3.5" fill="#5B2D8E"/>
    <circle cx="278" cy="376" r="3.5" fill="#5B2D8E"/>
    <circle cx="292" cy="376" r="3.5" fill="#5B2D8E"/>
  </g>

  <!-- === Top decorative star/sparkle === -->
  <g filter="url(#purpleGlow)" transform="translate(256, 154)">
    <!-- Four-point star -->
    <path d="M 0 -18 L 3 -3 L 18 0 L 3 3 L 0 18 L -3 3 L -18 0 L -3 -3 Z"
          fill="#cc80ff" opacity="0.95"/>
    <!-- Inner highlight -->
    <circle cx="0" cy="0" r="4" fill="white" opacity="0.8"/>
  </g>
</svg>
