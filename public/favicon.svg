<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Full-bleed background (prevents clipping when installed as PWA icon) -->
  <rect width="64" height="64" fill="#1E0D3C"/>
  <!-- Book cover (nudged inward for maskable safe zone) -->
  <rect x="10" y="8" width="38" height="48" rx="4" ry="4" fill="#5B2D8E"/>
  <!-- Spine -->
  <rect x="10" y="8" width="7" height="48" rx="2" ry="2" fill="#3B1A6E"/>
  <!-- Pages edge -->
  <rect x="46" y="11" width="4" height="42" rx="1" ry="1" fill="#F5ECD7"/>
  <!-- Cover lines -->
  <rect x="21" y="24" width="22" height="2.5" rx="1.2" fill="rgba(255,255,255,0.35)"/>
  <rect x="21" y="31" width="18" height="2.5" rx="1.2" fill="rgba(255,255,255,0.25)"/>
  <rect x="21" y="38" width="20" height="2.5" rx="1.2" fill="rgba(255,255,255,0.2)"/>
  <rect x="21" y="45" width="14" height="2.5" rx="1.2" fill="rgba(255,255,255,0.15)"/>
</svg>
