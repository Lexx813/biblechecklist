<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E0D3C"/>
      <stop offset="100%" stop-color="#2D1257"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F2D85"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#341C5C"/>
      <stop offset="100%" stop-color="#4F2D85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="url(#bg)"/>

  <!-- Subtle glow behind book -->
  <ellipse cx="32" cy="36" rx="22" ry="18" fill="#7C3AED" opacity="0.15"/>

  <!-- Book shadow -->
  <rect x="13" y="12" width="36" height="44" rx="4" fill="#000" opacity="0.3"/>

  <!-- Book cover -->
  <rect x="12" y="10" width="36" height="44" rx="4" fill="url(#cover)"/>

  <!-- Spine -->
  <rect x="12" y="10" width="7" height="44" rx="3" fill="url(#spine)"/>

  <!-- Pages edge (right side) -->
  <rect x="46" y="13" width="3" height="38" rx="1" fill="#F5ECD7" opacity="0.9"/>
  <rect x="47" y="13" width="1" height="38" fill="#fff" opacity="0.4"/>

  <!-- Cover lines (text representation) -->
  <rect x="23" y="22" width="20" height="2.5" rx="1.2" fill="#fff" opacity="0.55" filter="url(#glow)"/>
  <rect x="23" y="28.5" width="16" height="2" rx="1" fill="#fff" opacity="0.35"/>
  <rect x="23" y="34" width="18" height="2" rx="1" fill="#fff" opacity="0.28"/>
  <rect x="23" y="39.5" width="13" height="2" rx="1" fill="#fff" opacity="0.20"/>

  <!-- Accent dot / bookmark ribbon -->
  <rect x="34" y="10" width="6" height="9" rx="0" fill="#C084FC" opacity="0.8"/>
  <polygon points="34,19 37,16.5 40,19" fill="#1E0D3C" opacity="0.6"/>
</svg>
