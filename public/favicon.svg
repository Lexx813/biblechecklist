<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#130629"/>
      <stop offset="100%" stop-color="#1E0D3C"/>
    </linearGradient>
    <linearGradient id="pageL" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="pageR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#D8B4FE"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <ellipse cx="32" cy="34" rx="20" ry="16" fill="#7C3AED" opacity="0.12"/>

  <!-- Open book group -->
  <g filter="url(#shadow)">
    <!-- Left page -->
    <path d="M8 20 Q8 17 11 16 L30 14 L30 46 L11 48 Q8 47 8 44 Z" fill="url(#pageL)"/>
    <!-- Right page -->
    <path d="M56 20 Q56 17 53 16 L34 14 L34 46 L53 48 Q56 47 56 44 Z" fill="url(#pageR)"/>
    <!-- Spine shadow -->
    <rect x="29.5" y="14" width="5" height="32" rx="1" fill="#4C1D95" opacity="0.4"/>
  </g>

  <!-- Lines on left page -->
  <line x1="13" y1="24" x2="27" y2="22.5" stroke="#6D28D9" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
  <line x1="13" y1="29.5" x2="27" y2="28.5" stroke="#6D28D9" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="13" y1="34.5" x2="26" y2="33.8" stroke="#6D28D9" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <line x1="13" y1="39" x2="24" y2="38.5" stroke="#6D28D9" stroke-width="1" stroke-linecap="round" opacity="0.18"/>

  <!-- Lines on right page -->
  <line x1="51" y1="24" x2="37" y2="22.5" stroke="#6D28D9" stroke-width="1.8" stroke-linecap="round" opacity="0.45"/>
  <line x1="51" y1="29.5" x2="37" y2="28.5" stroke="#6D28D9" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="51" y1="34.5" x2="38" y2="33.8" stroke="#6D28D9" stroke-width="1.2" stroke-linecap="round" opacity="0.25"/>
  <line x1="51" y1="39" x2="40" y2="38.5" stroke="#6D28D9" stroke-width="1" stroke-linecap="round" opacity="0.18"/>

  <!-- Teal progress arc badge (bottom-right) -->
  <circle cx="47" cy="47" r="11" fill="#0F0628"/>
  <circle cx="47" cy="47" r="10" fill="#14B8A6"/>
  <!-- Checkmark -->
  <polyline points="42.5,47 46,50.5 52.5,43.5" fill="none" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
