name: Render & Post Daily Bible Verse

on:
  # Triggered by the Supabase Edge Function via workflow_dispatch
  workflow_dispatch:
    inputs:
      verse_id:
        description: "daily_verses row ID"
        required: true
      reference:
        description: "e.g. John 3:16"
        required: true
      verse_text:
        description: "Full verse text"
        required: true
      reflection:
        description: "Reflection question"
        required: true
      accent_color:
        description: "Hex accent colour"
        required: false
        default: "#00d4ff"

  # Fallback: run directly at 08:00 UTC every day
  schedule:
    - cron: "0 8 * * *"

jobs:
  render-and-post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: video

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: video/package-lock.json

      - name: Install Chrome (required by Remotion)
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      # ── Resolve verse props ────────────────────────────────────────────────
      # When triggered by schedule (not dispatch), fetch today's verse from Supabase
      - name: Fetch verse from Supabase (schedule trigger only)
        if: github.event_name == 'schedule'
        id: fetch_verse
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RESPONSE=$(curl -sf \
            "${{ secrets.SUPABASE_URL }}/rest/v1/daily_verses?scheduled_date=eq.${TODAY}&posted_at=is.null&select=*&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")
          echo "verse_id=$(echo $RESPONSE | jq -r '.[0].id')" >> $GITHUB_OUTPUT
          echo "reference=$(echo $RESPONSE | jq -r '.[0].reference')" >> $GITHUB_OUTPUT
          echo "verse_text=$(echo $RESPONSE | jq -r '.[0].verse_text')" >> $GITHUB_OUTPUT
          echo "reflection=$(echo $RESPONSE | jq -r '.[0].reflection')" >> $GITHUB_OUTPUT
          echo "accent_color=$(echo $RESPONSE | jq -r '.[0].accent_color')" >> $GITHUB_OUTPUT

      - name: Set verse props
        id: verse
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "verse_id=${{ inputs.verse_id }}"        >> $GITHUB_OUTPUT
            echo "reference=${{ inputs.reference }}"      >> $GITHUB_OUTPUT
            echo "verse_text=${{ inputs.verse_text }}"    >> $GITHUB_OUTPUT
            echo "reflection=${{ inputs.reflection }}"    >> $GITHUB_OUTPUT
            echo "accent_color=${{ inputs.accent_color }}" >> $GITHUB_OUTPUT
          else
            echo "verse_id=${{ steps.fetch_verse.outputs.verse_id }}"       >> $GITHUB_OUTPUT
            echo "reference=${{ steps.fetch_verse.outputs.reference }}"     >> $GITHUB_OUTPUT
            echo "verse_text=${{ steps.fetch_verse.outputs.verse_text }}"   >> $GITHUB_OUTPUT
            echo "reflection=${{ steps.fetch_verse.outputs.reflection }}"   >> $GITHUB_OUTPUT
            echo "accent_color=${{ steps.fetch_verse.outputs.accent_color }}" >> $GITHUB_OUTPUT
          fi

      # ── Render ─────────────────────────────────────────────────────────────
      - name: Render BibleVerse video
        run: |
          mkdir -p out
          npx remotion render BibleVerse out/verse.mp4 \
            --props='{"reference":"${{ steps.verse.outputs.reference }}","text":"${{ steps.verse.outputs.verse_text }}","reflection":"${{ steps.verse.outputs.reflection }}","accentColor":"${{ steps.verse.outputs.accent_color }}"}'

      # ── Upload to TikTok ───────────────────────────────────────────────────
      - name: Upload video to TikTok
        id: tiktok_upload
        run: node ../scripts/tiktok-upload.mjs
        env:
          VIDEO_PATH: out/verse.mp4
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          VERSE_REFERENCE: ${{ steps.verse.outputs.reference }}

      # ── Mark as posted ─────────────────────────────────────────────────────
      - name: Mark verse as posted in Supabase
        run: |
          curl -sf -X PATCH \
            "${{ secrets.SUPABASE_URL }}/rest/v1/daily_verses?id=eq.${{ steps.verse.outputs.verse_id }}" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"posted_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"tiktok_video_id\": \"${{ steps.tiktok_upload.outputs.publish_id }}\"}"
