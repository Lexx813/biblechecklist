    {
      "@context": "https://schema.org",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is NWT Progress?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NWT Progress is a free Bible reading tracker designed specifically for the New World Translation. It lets you track progress through all 66 books, take quizzes, connect with a community, and earn badges."
          }
        },
        {
          "@type": "Question",
          "name": "Is NWT Progress free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. NWT Progress has a free plan with access to the Bible tracker, blog, forum, and quiz. A premium plan adds reading plans, study notes, AI companion, direct messaging, and study groups."
          }
        },
        {
          "@type": "Question",
          "name": "How many books does the Bible tracker cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The tracker covers all 66 books of the Bible according to the New World Translation, split between the Hebrew Scriptures and the Christian Greek Scriptures."
          }
        },
        {
          "@type": "Question",
          "name": "Can I track my Bible reading offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. NWT Progress is a Progressive Web App (PWA) that can be installed on your home screen and works offline for reading and tracking."
          }
        },
        {
          "@type": "Question",
          "name": "What languages does NWT Progress support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "NWT Progress is available in English, Spanish, Portuguese, French, Tagalog, and Mandarin Chinese."
          }
        }
      ]
    }
